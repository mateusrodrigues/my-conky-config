conky.config = {
    -- Window settings
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'normal',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    background = false, 
    
    -- Placement (Top Right Corner)
    alignment = 'top_right',
    gap_x = 60,
    gap_y = 60,
    
    -- *** FIX: Force the window to be wide enough so the date doesn't clip ***
    minimum_width = 400,
    
    -- Appearance
    use_xft = true,
    font = 'Ubuntu:size=12',
    xftalpha = 0.9,
    update_interval = 1,
    double_buffer = true,
    draw_shades = true,
    default_shade_color = '000000',
    draw_outline = false,
    
    -- Color Palette
    default_color = 'FFFFFF', -- White/Silver text
    color1 = 'E2231A',        -- ThinkPad Red
    color2 = 'E95420',        -- Ubuntu Orange
    color3 = '888888',        -- Dimmed Silver/Grey
}

conky.text = [[
${alignr}${color1}${font Ubuntu:weight=Bold:size=80}${time %H}${color3}:${color}${time %M}${font}
${voffset 10}${alignr}${offset 15}${color2}${font Ubuntu:weight=Bold:size=22}${time %A}${color}${font Ubuntu:weight=Light:size=22}, ${time %d %B %Y}${font}
${voffset 10}${color1}${hr 3}
${voffset 5}${alignr}${color3}${font Ubuntu:weight=Medium:size=10}${execi 86400 awk '{print toupper($0)}' /sys/class/dmi/id/product_version}   |   ${execi 86400 awk -F '"' '/^PRETTY_NAME/ { print toupper($2) }' /etc/os-release}${font}
]]
